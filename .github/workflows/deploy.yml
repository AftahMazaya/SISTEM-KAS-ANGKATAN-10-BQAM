name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd /opt/kas-artsacala
          git pull origin main

      - name: Build & Deploy
        run: |
          cd /opt/kas-artsacala
          docker compose build app
          docker compose up -d app
          docker image prune -f
