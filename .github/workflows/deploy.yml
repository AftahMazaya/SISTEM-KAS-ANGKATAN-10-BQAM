name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build & Deploy
        working-directory: /opt/kas-artsacala
        run: |
          docker compose build app
          docker compose up -d app
          docker image prune -f
